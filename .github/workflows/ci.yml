name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Отмена предыдущих прогонов в той же ветке (экономит минуты GHA).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =================================================================
  # Линтеры и тайп-чекер (ruff + mypy). См. backend/pyproject.toml.
  # =================================================================
  lint-type:
    name: Backend lint + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install "ruff>=0.6,<1.0" "mypy>=1.11,<2.0" "pytest>=8.3,<9.0" \
                      "pytest-asyncio>=0.23,<1.0" "pytest-cov>=5.0,<6.0" "httpx>=0.27,<1.0"

      - name: ruff check
        run: ruff check backend/

      - name: ruff format --check
        run: ruff format --check backend/

      - name: mypy
        run: mypy --config-file backend/pyproject.toml backend/app

  # =================================================================
  # Backend тесты (pytest).
  # =================================================================
  tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install "pytest>=8.3,<9.0" "pytest-asyncio>=0.23,<1.0" \
                      "pytest-cov>=5.0,<6.0" "httpx>=0.27,<1.0"

      - name: Run pytest
        working-directory: backend
        env:
          # Settings() требует обязательные секреты при импорте. Значения — фейковые,
          # в тестах не используются (см. tests/*.py — импортят только модели/логику).
          ADMIN_API_KEY: "ci-dummy-0123456789abcdef"
          SMTP_PASSWORD: "ci-dummy"
          OPENROUTER_API_KEY: "ci-dummy-xxxxxxxxxx"
        run: pytest tests/ -v

  # =================================================================
  # Alembic upgrade/downgrade (чистая БД) — ОТКЛЮЧЕН.
  #
  # Причина: в репозитории нет initial-миграции. Первая миграция в цепочке
  # (`20260402_uute_fc`) уже использует таблицу `order_files`, которая
  # создавалась ранее (вне версий в git). В prod БД живёт с предыдущих
  # релизов, поэтому миграции работают инкрементально; но `alembic upgrade
  # head` на чистом Postgres падает:
  #   UndefinedTableError: relation "order_files" does not exist.
  #
  # Включим обратно после задачи `chore/alembic-initial-migration` —
  # см. docs/tasktracker.md.
  # =================================================================

  # =================================================================
  # Frontend (Vite + ESLint).
  # =================================================================
  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build

  # =================================================================
  # Pre-commit: единая проверка всех хуков через pre-commit action cache.
  # =================================================================
  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
