name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Отмена предыдущих прогонов в той же ветке (экономит минуты GHA).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =================================================================
  # Линтеры и тайп-чекер (ruff + mypy). См. backend/pyproject.toml.
  # =================================================================
  lint-type:
    name: Backend lint + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -e "backend[dev]"

      - name: ruff check
        run: ruff check backend/

      - name: ruff format --check
        run: ruff format --check backend/

      - name: mypy
        run: mypy --config-file backend/pyproject.toml backend/app

  # =================================================================
  # Backend тесты (pytest).
  # =================================================================
  tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -e "backend[dev]"

      - name: Run pytest
        working-directory: backend
        env:
          # Settings() требует обязательные секреты при импорте. Значения — фейковые,
          # в тестах не используются (см. tests/*.py — импортят только модели/логику).
          ADMIN_API_KEY: "ci-dummy-0123456789abcdef"
          SMTP_PASSWORD: "ci-dummy"
          OPENROUTER_API_KEY: "ci-dummy-xxxxxxxxxx"
        run: pytest tests/ -v

  # =================================================================
  # Alembic: чистый Postgres → upgrade head → downgrade base → upgrade head.
  # Гарантирует обратимость миграций (ловит регрессы типа «потерянная миграция»).
  # =================================================================
  alembic:
    name: Alembic upgrade/downgrade
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: uute_db
          POSTGRES_USER: uute
          POSTGRES_PASSWORD: uute_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uute -d uute_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://uute:uute_password@localhost:5432/uute_db
          ADMIN_API_KEY: "ci-dummy-0123456789abcdef"
          SMTP_PASSWORD: "ci-dummy"
          OPENROUTER_API_KEY: "ci-dummy-xxxxxxxxxx"
        run: alembic upgrade head

      - name: Alembic downgrade base
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://uute:uute_password@localhost:5432/uute_db
          ADMIN_API_KEY: "ci-dummy-0123456789abcdef"
          SMTP_PASSWORD: "ci-dummy"
          OPENROUTER_API_KEY: "ci-dummy-xxxxxxxxxx"
        run: alembic downgrade base

      - name: Alembic upgrade head again
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://uute:uute_password@localhost:5432/uute_db
          ADMIN_API_KEY: "ci-dummy-0123456789abcdef"
          SMTP_PASSWORD: "ci-dummy"
          OPENROUTER_API_KEY: "ci-dummy-xxxxxxxxxx"
        run: alembic upgrade head

  # =================================================================
  # Frontend (Vite + ESLint).
  # =================================================================
  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # =================================================================
  # Pre-commit: единая проверка всех хуков через pre-commit action cache.
  # =================================================================
  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
